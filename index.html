<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Careers</title>
</head>
<body>

<h2>Job Application</h2>

<form id="employmentForm" enctype="multipart/form-data">
  <input name="fullName" placeholder="Full Name" required /><br><br>
  <input name="email" type="email" placeholder="Email" required /><br><br>
  <input name="phone" placeholder="Phone" required /><br><br>
  <input name="address" placeholder="Address" required /><br><br>
  <input name="position" placeholder="Position" required /><br><br>
  <input name="experience" placeholder="Years of Experience" required /><br><br>
  <textarea name="coverLetter" placeholder="Cover Letter"></textarea><br><br>
  <input type="file" name="idUpload" required /><br><br>

  <button type="submit">Submit</button>
</form>

<p id="status"></p>

<script>
const form = document.getElementById("employmentForm");
const status = document.getElementById("status");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);

  try {
    const res = await fetch("http://localhost:3000/submit-application", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    status.textContent = data.message;
  } catch (err) {
    status.textContent = "Server error";
  }
});
</script>

</body>
</html>
